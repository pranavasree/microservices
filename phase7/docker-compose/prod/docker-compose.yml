services:
  accounts_db:
    container_name: accounts_db
    ports:
      - 3306:3306
    environment:
      MYSQL_DATABASE: accounts_db
    extends:
      file: common-config.yml
      service: microservice-db-config

  loans_db:
    container_name: loans_db
    ports:
      - 3307:3307
    environment:
      MYSQL_DATABASE: loans_db
    extends:
      file: common-config.yml
      service: microservice-db-config

  cards_db:
    container_name: cards_db
    ports:
      - 3308:3308
    environment:
      MYSQL_DATABASE: cards_db
    extends:
      file: common-config.yml
      service: microservice-db-config


  configserver:
    image: "pranavasree/configserver:s7"
    container_name: configserver_ms
    ports:
      - "8071:8071"
    #    depends_on:
    #      rabbit:
    #        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent localhost:8071/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    extends:
      file: common-config.yml
      service: microservice-base-config

  accounts:
    image: "pranavasree/accounts:s7"
    container_name: accounts_ms
    ports:
      - "9000:9000"
    depends_on:
      accounts_db:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "accounts"
      SPRING_DATASOURCE_URL: "jdbc:mysql://accounts_db:3306/accounts_db"
    extends:
      file: common-config.yml
      service: microservice-configserver-config

  loans:
    image: "pranavasree/loans:s7"
    container_name: loans_ms
    ports:
      - "9001:9001"
    depends_on:
      loans_db:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "loans"
      SPRING_DATASOURCE_URL: "jdbc:mysql://loans_db:3306/loans_db"
    extends:
      file: common-config.yml
      service: microservice-configserver-config

  cards:
    image: "pranavasree/cards:s7"
    container_name: cards_ms
    ports:
      - "9002:9002"
    depends_on:
      cards_db:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "cards"
      SPRING_DATASOURCE_URL: "jdbc:mysql://cards_db:3306/cards_db"
    extends:
      file: common-config.yml
      service: microservice-configserver-config

networks:
  Bank:
    driver: "bridge"
