services:
  accounts:
    image: "pranavasree/accounts:s4"
    container_name: accounts_ms
    ports:
      - "9000:9000"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - Bank

  loans:
    image: "pranavasree/loans:s4"
    container_name: loans_ms
    ports:
      - "9001:9001"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - Bank

  cards:
    image: "pranavasree/cards:s4"
    container_name: cards_ms
    ports:
      - "9002:9002"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - Bank

networks:
  Bank:
    driver: "bridge"
